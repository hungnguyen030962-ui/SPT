version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      # Persist SQLite database file
      - ./backend:/app
    environment:
      - DATABASE_URL=sqlite:////app/spt_prep.db

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
